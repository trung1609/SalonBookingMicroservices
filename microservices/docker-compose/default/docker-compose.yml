services:

  user_db_salon_booking:
    image: postgres:16
    container_name: user_db_salon_booking
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - user-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: user_db_salon_booking
    networks:
      - vmt1609

  booking_service_db_salon_booking:
    image: postgres:16
    container_name: booking_service_db_salon_booking
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: booking_service_db_salon_booking
    volumes:
      - booking-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - vmt1609

  category_db_salon_booking:
    image: postgres:16
    container_name: category_db_salon_booking
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: category_db_salon_booking
    volumes:
      - category-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
    networks:
      - vmt1609

  payment_service_db_salon_booking:
    image: postgres:16
    container_name: payment_service_db_salon_booking
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: payment_service_db_salon_booking
    volumes:
      - payment-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
    networks:
      - vmt1609

  salon_db_salon_booking:
    image: postgres:16
    container_name: salon_db_salon_booking
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: salon_db_salon_booking
    volumes:
      - salon-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
    networks:
      - vmt1609

  service_offer_db_salon_booking:
    image: postgres:16
    container_name: service_offer_db_salon_booking
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: service_offer_db_salon_booking
    volumes:
      - service-offer-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
    networks:
      - vmt1609

  eurekaserver:
    image: "vmt1609/salon-eureka-server:v1"
    ports:
      - "9999:9999"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent localhost:9999/actuator/health/readiness | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    container_name: eurekaserver

    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - vmt1609


  user:
    image: "vmt1609/salon-user-service:v1"
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent localhost:8080/actuator/health/readiness | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    container_name: user
    depends_on:
      user_db_salon_booking:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "user-service"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://user_db_salon_booking:5432/user_db_salon_booking"
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:9999/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - vmt1609


  booking:
    image: "vmt1609/salon-booking-service:v1"
