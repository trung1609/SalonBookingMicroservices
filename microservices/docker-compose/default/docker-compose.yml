      SPRING_DATASOURCE_URL: "jdbc:postgresql://booking_service_db_salon_booking:5432/booking_service_db_salon_booking"
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eurekaserver:9999/eureka/
    deploy:
